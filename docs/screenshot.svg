<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 560" width="780" height="560">
  <defs>
    <linearGradient id="winbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e2836"/>
      <stop offset="100%" stop-color="#27212e"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <clipPath id="clip">
      <rect width="780" height="560" rx="10"/>
    </clipPath>
  </defs>

  <!-- Window shadow -->
  <rect x="10" y="18" width="760" height="542" rx="10" fill="#000" opacity="0.4"/>

  <!-- Window frame -->
  <g filter="url(#shadow)">
    <rect width="780" height="560" rx="10" fill="#1e1a27" clip-path="url(#clip)"/>
  </g>

  <!-- Title bar -->
  <rect width="780" height="36" rx="10" fill="#302a3a" clip-path="url(#clip)"/>
  <rect y="26" width="780" height="10" fill="#302a3a"/>
  <!-- Traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <!-- Title bar text -->
  <text x="390" y="23" font-family="'SF Pro Text', system-ui, sans-serif" font-size="12"
        fill="#8a7a9a" text-anchor="middle">*Claude: ~/Documents/code/claude-code.el/*</text>

  <!-- Buffer background -->
  <rect y="36" width="780" height="524" fill="#27212e"/>

  <!-- ── HEADER ── -->
  <!-- "Claude Code" title -->
  <text x="20" y="68" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="17" font-weight="bold" fill="#40b4c4">Claude Code</text>
  <!-- status -->
  <text x="158" y="68" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="13" fill="#544863">  [ready]</text>
  <!-- cwd -->
  <text x="258" y="68" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="13" fill="#544863">  ~/Documents/code/claude-code.el/</text>

  <!-- Config buttons row -->
  <text x="20" y="88" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#544863">  model:</text>
  <text x="85" y="88" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#40b4c4" text-decoration="underline">[default]</text>
  <text x="155" y="88" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#544863">  effort:</text>
  <text x="222" y="88" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#40b4c4" text-decoration="underline">[none]</text>
  <text x="275" y="88" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#544863">  perms:</text>
  <text x="340" y="88" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#40b4c4" text-decoration="underline">[bypassPermissions]</text>
  <text x="505" y="88" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#eb64b9" text-decoration="underline">  [↓ Save as Project Default]</text>

  <!-- Separator -->
  <text x="20" y="105" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#544863">──────────────────────────────────────────────────────────────────────</text>

  <!-- Action buttons -->
  <text x="20" y="122" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#eb64b9">  [Reset]</text>
  <text x="90" y="122" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#eb64b9">  [New Session]</text>

  <!-- ── TURN 1 ── -->
  <text x="20" y="150" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="13" font-weight="bold" fill="#40b4c4">▶ You</text>
  <text x="80" y="150" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#eb64b9">  [fork]</text>
  <text x="20" y="168" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#ffffff">  Add clickable config buttons to the header</text>

  <text x="20" y="192" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="13" font-weight="bold" fill="#eb64b9">◀ Assistant</text>
  <!-- Thinking block (collapsed) -->
  <text x="20" y="212" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#91889b">  ◆ Thinking</text>
  <text x="400" y="212" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="11" fill="#544863">                    [TAB to expand]</text>
  <!-- Tool blocks -->
  <text x="20" y="228" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#ffe261">  ⚙ Explore</text>
  <text x="115" y="228" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#b4dce7">  Explore codebase structure</text>
  <text x="400" y="228" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="11" fill="#544863">              [TAB to expand]</text>
  <text x="20" y="244" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#ffe261">  ⚙ Read</text>
  <text x="95" y="244" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#b4dce7">  claude-code-render.el</text>
  <text x="400" y="244" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="11" fill="#544863">                        [TAB to expand]</text>
  <text x="20" y="260" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#ffe261">  ⚙ Edit</text>
  <text x="95" y="260" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#b4dce7">  claude-code-render.el · claude-code-commands.el</text>

  <!-- Assistant prose -->
  <text x="20" y="284" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#ffffff">  Done! The header now shows model, effort and</text>
  <text x="20" y="300" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#ffffff">  permission mode as clickable buttons, plus a</text>
  <text x="20" y="316" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#ffffff">  </text>
  <text x="34" y="316" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#eb64b9">[↓ Save as Project Default]</text>
  <text x="230" y="316" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#ffffff"> button that persists</text>
  <text x="20" y="332" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#ffffff">  your settings via </text>
  <text x="154" y="332" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#b4dce7">customize-save-variable</text>
  <text x="340" y="332" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#ffffff">.</text>

  <!-- Result line -->
  <text x="20" y="356" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#74dfc4">  ✓ Done | 3 turns | $0.0421 | 8.3s</text>

  <!-- Separator -->
  <text x="20" y="372" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#544863">──────────────────────────────────────────────────────────────────────</text>

  <!-- ── TURN 2 ── -->
  <text x="20" y="396" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="13" font-weight="bold" fill="#40b4c4">▶ You</text>
  <text x="80" y="396" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#eb64b9">  [fork]</text>
  <text x="20" y="414" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#ffffff">  update the readme with a snazzy logo and screenshot</text>

  <!-- Spinner / working -->
  <text x="20" y="438" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#544863">  ⠹ Working… (4s · ↓ 128 chars · thought 2s)</text>

  <!-- Separator -->
  <text x="20" y="458" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#544863">──────────────────────────────────────────────────────────────────────</text>

  <!-- ── INPUT AREA ── -->
  <rect x="0" y="466" width="780" height="94" fill="#221d2a"/>
  <text x="20" y="490" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="13" font-weight="bold" fill="#eb64b9">›</text>
  <!-- cursor blink rectangle -->
  <rect x="36" y="476" width="8" height="16" fill="#eb64b9" opacity="0.8"/>
</svg>
