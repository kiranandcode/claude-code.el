<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1a27"/>
      <stop offset="100%" stop-color="#27212e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#40b4c4"/>
      <stop offset="100%" stop-color="#eb64b9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="520" height="120" rx="12" fill="url(#bg)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="120" rx="2" fill="url(#accent)"/>

  <!-- Lambda / Emacs symbol -->
  <text x="36" y="72" font-family="serif" font-size="52" fill="#40b4c4"
        filter="url(#glow)" opacity="0.9">λ</text>

  <!-- Title -->
  <text x="88" y="58" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="28" font-weight="bold" fill="#ffffff" letter-spacing="-0.5">
    claude-code
  </text>
  <text x="88" y="58" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="28" font-weight="bold" fill="url(#accent)" letter-spacing="-0.5"
        opacity="0.15">
    claude-code
  </text>

  <!-- .el suffix -->
  <text x="336" y="58" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="28" font-weight="bold" fill="#eb64b9">.el</text>

  <!-- Tagline -->
  <text x="89" y="82" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="13" fill="#544863" letter-spacing="0.3">
    Claude AI · Emacs · Agent SDK
  </text>

  <!-- Decorative dots top-right -->
  <circle cx="480" cy="28" r="4" fill="#40b4c4" opacity="0.5"/>
  <circle cx="496" cy="28" r="4" fill="#eb64b9" opacity="0.5"/>
  <circle cx="512" cy="28" r="4" fill="#74dfc4" opacity="0.5"/>
</svg>
